        - name: season_number
          in: path
          required: true
          description: Season number (1-based).
          schema:
            type: integer
            minimum: 1
            example: 3
        - name: minimum_ratings
          in: query
          description: Minimum IMDb user rating (0–10 scale).
          schema:
            type: number
            minimum: 0
            maximum: 10
        - $ref: "#/components/parameters/releaseDateRange"
      responses:
        "200":
          description: Episodes for the requested season.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TvShowSeasonEpisodes"
        "404":
