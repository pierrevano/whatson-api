  /episodes/rated:
    get:
      operationId: getRatedEpisodes
      summary: Get highest or lowest rated episodes across all TV shows
      description: |
        Returns IMDb-rated episodes ranked across all TV shows. Supports episode-level
        sorting (by rating, ascending or descending) and TV show–level filters (genre,
        platform, network, status, and more). Each result includes the parent show's
        metadata alongside the episode data.

        Only episodes with at least `minimum_users_rating_count` user ratings (default 100)
        are included to filter out low-confidence ratings.
      tags: [Episodes]
      parameters:
        - name: title
          in: query
          description: Search across the TV show title, episode title, or TV show networks (partial match, case-insensitive).
          schema:
            type: string
        - $ref: "#/components/parameters/genres"
        - $ref: "#/components/parameters/platforms"
        - $ref: "#/components/parameters/networks"
        - name: is_active
          in: query
          description: |
            `true` returns only active TV shows, `false` returns only inactive TV shows,
            `true,false` (or omitting this parameter) returns both.
          schema:
            type: string
            example: "true"
        - name: is_adult
          in: query
          description: |
            `false` (default) returns only non-adult TV shows, `true` returns only
            adult-flagged TV shows, `true,false` returns both.
          schema:
            type: string
            default: "false"
            example: "true"
        - name: must_see
          in: query
          description: |
            `true` returns only TV shows with Metacritic "Must-See" badge, `false`
            returns only those without it, `true,false` returns both.
          schema:
            type: string
            example: "true"
        - name: users_certified
          in: query
          description: |
            `true` returns only TV shows with Rotten Tomatoes "Verified Audience"
            certification, `false` returns only uncertified shows, `true,false` returns both.
          schema:
            type: string
            example: "true"
        - name: critics_certified
          in: query
          description: |
            `true` returns only TV shows with Rotten Tomatoes "Certified Fresh" status,
            `false` returns only non-certified shows, `true,false` returns both.
          schema:
            type: string
            example: "true"
        - name: directors
          in: query
          description: Comma-separated director names (partial match). Pass `all` to skip this filter.
          schema:
            type: string
        - name: production_companies
          in: query
          description: Comma-separated production company names (partial match). Pass `all` to skip this filter.
          schema:
            type: string
        - name: status
          in: query
          description: Filter the parent TV show by production status.
          schema:
            type: string
            enum: [canceled, ended, ongoing, pilot, unknown]
        - name: filtered_seasons
          in: query
          description: |
            Comma-separated season numbers to restrict results to.
            Example: `1,2` returns only episodes from seasons 1 and 2.
          schema:
            type: string
            example: "1,2"
        - name: minimum_ratings
          in: query
          description: Minimum IMDb user rating (0–10 scale).
          schema:
            type: number
            minimum: 0
            maximum: 10
            example: 9.0
        - name: minimum_users_rating_count
          in: query
          description: Minimum number of IMDb user ratings required per episode (default 100).
          schema:
            type: integer
            minimum: 0
            default: 100
        - $ref: "#/components/parameters/releaseDateRange"
        - name: order
          in: query
          description: "`desc` returns top-rated episodes, `asc` returns lowest-rated episodes (default: `desc`)."
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/page"
      responses:
        "200":
          description: Paginated rated episodes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRatedEpisodes"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No matching items found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed.
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          description: Internal server error.
