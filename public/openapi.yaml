  /tvshow/{id}/seasons:
    get:
      operationId: getTvShowSeasons
      summary: Get all seasons for a TV show
      description: |
        Returns per-season episode counts and IMDb rating summaries (average rating,
        highest-rated episode, lowest-rated episode).
      tags: [TV Shows]
      parameters:
        - name: id
          in: path
          required: true
          description: TMDB numeric ID of the TV show.
          schema:
            type: integer
            example: 1396
        - name: append_to_response
          in: query
          description: |
            Optional fields to include. Two scopes:

            **Added to each season object:** `rating_distribution` (episode count per rating band),
            `rating_distribution_episodes` (episode list per rating band).

            **Added to the root response (across all seasons):** `highest_episode`, `lowest_episode`,
            `last_episode`, `next_episode`.
          schema:
            type: string
            example: "rating_distribution,highest_episode"
      responses:
        "200":
          description: TV show seasons summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TvShowSeasons"
        "404":
          description: Not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed.
        "429":
          $ref: "#/components/responses/RateLimitExceeded"
        "500":
          description: Internal server error.

  /tvshow/{id}/seasons/{season_number}/episodes:
    get:
      operationId: getTvShowSeasonEpisodes
